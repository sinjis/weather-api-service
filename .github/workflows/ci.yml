name: CI (forced-debug)

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show repo structure
        run: |
          echo "=== ROOT ==="
          ls -la
          echo "=== SRC ==="
          find src -type f || true
          echo "=== TESTS ==="
          find tests -type f || true

      - name: Install dependencies (NO coverage)
        run: |
          python -m pip install --upgrade pip
          pip install Flask pytest

      - name: Import sanity check
        run: |
          python - << 'EOF'
          import sys
          print("sys.path:")
          for p in sys.path:
              print(" ", p)

          print("\nTrying import:")
          import weather_api_service
          print("✅ weather_api_service imported")
          EOF

      - name: Run pytest (capture exit code manually)
        continue-on-error: true
        env:
          PYTHONPATH: src
        run: |
          set -x
          python -m pytest -vv -s --maxfail=1
          echo "PYTEST_EXIT_CODE=$?" > pytest_exit_code.txt

      - name: Show pytest exit code
        run: |
          cat pytest_exit_code.txt

      - name: Fail job if pytest failed
        run: |
          CODE=$(cut -d= -f2 pytest_exit_code.txt)
          if [ "$CODE" != "0" ]; then
            echo "❌ pytest failed with exit code $CODE"
            exit 1
          fi
