name: CI (hard-debug)

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Environment diagnostics
        run: |
          set -x
          python --version
          pip --version
          echo "PWD=$(pwd)"
          echo "Root:"
          ls -la
          echo "src/:"
          find src -type f || true
          echo "tests/:"
          find tests -type f || true

      - name: Install dependencies (full trace)
        run: |
          set -x
          python -m pip install --upgrade pip
          pip install -e . -v
          pip install -e .[dev] -v
          pip list

      - name: Python import sanity check
        run: |
          set -x
          python - << 'EOF'
          import sys
          print("sys.path:")
          for p in sys.path:
              print(" ", p)

          print("\nImport checks:")
          import weather_api_service
          print("✅ weather_api_service OK")
          EOF

      - name: Pytest configuration dump
        env:
          PYTHONPATH: src
        run: |
          set -x
          python -m pytest --version
          python -m pytest --trace-config
          python -m pytest --collect-only -vv -s

      - name: Pytest execution (no capture, stop on first error)
        env:
          PYTHONPATH: src
        run: |
          set -x
          python -m pytest -vv -s --maxfail=1 --showlocals
