name: CI (debug)

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show Python & environment info
        run: |
          python --version
          which python
          pip --version
          echo "PWD=$(pwd)"
          echo "Listing repo root:"
          ls -la
          echo "Listing src/:"
          ls -la src || true
          echo "Listing tests/:"
          ls -la tests || true

      - name: Install dependencies (verbose)
        run: |
          python -m pip install --upgrade pip
          pip install -e . -v
          pip install -e .[dev] -v
          pip list

      - name: Verify package import explicitly
        run: |
          python - << 'EOF'
          import sys
          print("sys.path:")
          for p in sys.path:
              print(" ", p)

          print("\nTrying imports...")
          import weather_api_service
          print("✅ import weather_api_service OK")

          from weather_api_service import service
          print("✅ import weather_api_service.service OK")
          EOF

      - name: Collect tests only (no execution)
        env:
          PYTHONPATH: src
        run: |
          python -m pytest --collect-only -vv

      - name: Run tests with max verbosity
        env:
          PYTHONPATH: src
        run: |
          python -m pytest -vvv --maxfail=1 --showlocals
