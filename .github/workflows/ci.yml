name: CI (forensic-debug)

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show repo structure
        run: |
          echo "=== PWD ==="
          pwd
          echo "=== ROOT FILES ==="
          ls -la
          echo "=== SRC TREE ==="
          find src -type f || true
          echo "=== TESTS TREE ==="
          find tests -type f || true

      - name: Install dependencies (full verbose)
        run: |
          set -x
          python -m pip install --upgrade pip
          pip install -e . -v
          pip install -e .[dev] -v
          pip list

      - name: Sanity check imports
        run: |
          set -x
          python - << 'EOF'
          import sys
          print("sys.path:")
          for p in sys.path:
              print(" ", p)

          print("\nTrying imports:")
          import weather_api_service
          print("✅ weather_api_service imported")

          from weather_api_service import service
          print("✅ weather_api_service.service imported")
          EOF

      - name: Pytest collection (no execution)
        env:
          PYTHONPATH: src
        run: |
          set -x
          python -m pytest --collect-only -vv -s

      - name: Pytest execution (no capture)
        env:
          PYTHONPATH: src
        run: |
          set -x
          python -m pytest -vv -s --maxfail=1 --showlocals
