name: CI (force-output)

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show repo structure
        run: |
          echo "=== ROOT ==="
          ls -la
          echo "=== SRC ==="
          find src -type f || true
          echo "=== TESTS ==="
          find tests -type f || true

      - name: Install dependencies (minimal, no coverage)
        run: |
          python -m pip install --upgrade pip
          pip install Flask pytest

      - name: Run pytest and capture output
        env:
          PYTHONPATH: src
        run: |
          set +e
          python -m pytest -vv -s --maxfail=1 > pytest.log 2>&1
          echo "PYTEST_EXIT_CODE=$?" > pytest_exit_code.txt
          set -e

      - name: Dump pytest output (ALWAYS)
        run: |
          echo "================ PYTEST OUTPUT ================"
          cat pytest.log || true
          echo "=============================================="

      - name: Fail job if pytest failed
        run: |
          CODE=$(cut -d= -f2 pytest_exit_code.txt)
          echo "pytest exit code: $CODE"
          if [ "$CODE" != "0" ]; then
            exit 1
          fi
``
